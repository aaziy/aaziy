<svg viewBox="0 0 1200 280" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Muhammad Aziq Rauf — Software Engineer specializing in AI/ML">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="38%" r="80%">
      <stop offset="0%" stop-color="#121822"/>
      <stop offset="100%" stop-color="#0B0E14"/>
    </radialGradient>
    <linearGradient id="scanGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2EE6FF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#6FF3FF" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#2EE6FF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="barGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2EE6FF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#2EE6FF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#2EE6FF" stop-opacity="0"/>
    </linearGradient>
    <filter id="softBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 L0 0 0 40" fill="none" stroke="#16202B" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- backdrop -->
  <rect x="0" y="0" width="1200" height="280" rx="16" fill="url(#bgGlow)"/>
  <rect x="0" y="0" width="1200" height="280" rx="16" fill="url(#grid)" opacity="0.5"/>
  <rect x="0.75" y="0.75" width="1198.5" height="278.5" rx="15.25" fill="none" stroke="#1B2330" stroke-width="1.5"/>

  <!-- corner brackets -->
  <g stroke="#2EE6FF" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.9">
    <path d="M26,58 L26,26 L58,26"/>
    <path d="M1142,26 L1174,26 L1174,58"/>
    <path d="M1174,222 L1174,254 L1142,254"/>
    <path d="M58,254 L26,254 L26,222"/>
    <animate attributeName="opacity" values="0.55;1;0.55" dur="3.2s" repeatCount="indefinite"/>
  </g>

  <!-- identity badge: left — Software Engineer -->
  <g font-family="'JetBrains Mono','Fira Code',ui-monospace,Menlo,monospace">
    <rect x="56" y="34" width="230" height="34" rx="6" fill="#10151D" stroke="#1A5A68" stroke-width="1">
      <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="4s" repeatCount="indefinite"/>
    </rect>
    <text x="71" y="57" font-size="15" font-weight="700" fill="#2EE6FF">&lt;/&gt;</text>
    <text x="99" y="57" font-size="12.5" font-weight="600" letter-spacing="1.4" fill="#C7D4DD">SOFTWARE ENGINEER</text>
  </g>

  <!-- identity badge: right — AI / ML Specialist -->
  <g font-family="'JetBrains Mono','Fira Code',ui-monospace,Menlo,monospace">
    <rect x="914" y="34" width="230" height="34" rx="6" fill="#10151D" stroke="#1A5A68" stroke-width="1">
      <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="4s" begin="0.6s" repeatCount="indefinite"/>
    </rect>
    <circle cx="931" cy="51" r="6.5" fill="none" stroke="#2EE6FF" stroke-width="1.6"/>
    <line x1="931" y1="40" x2="931" y2="44" stroke="#2EE6FF" stroke-width="1.6"/>
    <line x1="931" y1="58" x2="931" y2="62" stroke="#2EE6FF" stroke-width="1.6"/>
    <line x1="920" y1="51" x2="924" y2="51" stroke="#2EE6FF" stroke-width="1.6"/>
    <line x1="938" y1="51" x2="942" y2="51" stroke="#2EE6FF" stroke-width="1.6"/>
    <text x="950" y="57" font-size="12.5" font-weight="600" letter-spacing="1.4" fill="#C7D4DD">AI / ML SPECIALIST</text>
  </g>

  <!-- connecting trace, data flowing between the two identities -->
  <line x1="288" y1="51" x2="912" y2="51" stroke="#1EA8C4" stroke-width="1.2" stroke-dasharray="2 7" opacity="0.55">
    <animate attributeName="stroke-dashoffset" from="0" to="-36" dur="1.8s" repeatCount="indefinite"/>
  </line>

  <!-- title block -->
  <text x="600" y="138" text-anchor="middle" font-family="'JetBrains Mono','Fira Code',ui-monospace,Menlo,monospace" font-size="39" font-weight="700" fill="#E6EDF3" letter-spacing="1">MUHAMMAD AZIQ RAUF</text>
  <text x="600" y="166" text-anchor="middle" font-family="'JetBrains Mono','Fira Code',ui-monospace,Menlo,monospace" font-size="14.5" font-weight="500" fill="#2EE6FF" letter-spacing="3.5">ENGINEERING AI SYSTEMS, END TO END</text>

  <!-- animated build/progress bar under the mission line -->
  <rect x="470" y="180" width="260" height="3" rx="1.5" fill="#16202A"/>
  <rect x="470" y="180" width="70" height="3" rx="1.5" fill="url(#barGlow)">
    <animate attributeName="x" values="470;660;470" dur="2.6s" repeatCount="indefinite"/>
  </rect>

  <!-- telemetry: bottom-left, staggered -->
  <g font-family="'JetBrains Mono',Menlo,monospace" font-size="13" fill="#9FB1BD">
    <g opacity="0">
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.12;0.85;1" dur="9s" begin="0s" repeatCount="indefinite"/>
      <rect x="56" y="200" width="210" height="30" rx="5" fill="#10151D" stroke="#1A5A68" stroke-width="1"/>
      <circle cx="73" cy="215" r="3.5" fill="#2EE6FF"/>
      <text x="84" y="219">MODEL: LoRA-TUNED</text>
    </g>

    <!-- telemetry: bottom-right, staggered -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.12;0.85;1" dur="9s" begin="4.5s" repeatCount="indefinite"/>
      <rect x="934" y="200" width="210" height="30" rx="5" fill="#10151D" stroke="#1A5A68" stroke-width="1"/>
      <circle cx="951" cy="215" r="3.5" fill="#2EE6FF"/>
      <text x="962" y="219">INFER: 47 FPS @ 1080p</text>
    </g>
  </g>

  <!-- steady status pill, bottom-center -->
  <g font-family="'JetBrains Mono',Menlo,monospace" font-size="11">
    <rect x="515" y="242" width="170" height="24" rx="5" fill="#10151D" stroke="#3D3320" stroke-width="1"/>
    <circle cx="531" cy="254" r="3.5" fill="#FFC857">
      <animate attributeName="opacity" values="1;0.25;1" dur="1.7s" repeatCount="indefinite"/>
    </circle>
    <text x="542" y="258" fill="#C9B98A" letter-spacing="0.5">SYSTEM: ONLINE</text>
  </g>

  <!-- sweeping scan glow, on top of everything -->
  <rect x="-100" y="0" width="100" height="280" fill="url(#scanGlow)" filter="url(#softBlur)">
    <animate attributeName="x" values="-100;1200;-100" dur="7s" repeatCount="indefinite"/>
  </rect>
</svg>
